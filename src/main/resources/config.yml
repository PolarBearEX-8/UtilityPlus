# UtilityPlus Configuration

# Spawn Settings
# -----------------------------------------------
spawn:
  # Teleport player to spawn on their very first join
  tp-spawn-first-join: false
  # Teleport player to spawn after they click the Respawn button
  tp-spawn-on-death: false
  # Teleport to spawn on respawn ONLY if they have no bed/respawn anchor
  tp-spawn-no-respawn-point: false
  # Cooldown (seconds) between /spawn uses. 0 = disabled. OP bypasses.
  tp-spawn-cooldown: 30
  # Warmup (seconds) before teleporting — player must stand still. 0 = instant.
  tp-spawn-warmup: 5

# -----------------------------------------------
# Random Respawn Settings
# (When enabled, players respawn at a random location on death)
# Completely independent from the /setspawn system above.
# -----------------------------------------------
random-respawn:
  enabled: true
  min-radius: 0
  max-radius: 1000
  # How many locations to try before falling back to spawn
  attempts: 48
  # The world name where random respawn should happen (default to world)
  world: "world"

# -----------------------------------------------
# TPA Settings
# -----------------------------------------------
tpa:
  # How long (seconds) a TPA request stays active before expiring
  timeout: 60
  # How long (seconds) to wait before teleporting after /tpaccept
  # Player must not move during this time or the teleport is cancelled
  warmup: 3

# -----------------------------------------------
# Home Settings
# -----------------------------------------------
home:
  # Warmup (seconds) before teleporting — player must stand still. 0 = instant.
  warmup: 3
  # Maximum number of home slots per player (1–4).
  max-homes: 4

# -----------------------------------------------
# Team Settings
# -----------------------------------------------
team:
  # Maximum number of players per team
  max-members: 10
  # How long (seconds) an invite stays valid before expiring
  invite-timeout: 60
  # Auto-kick members offline for longer than this many minutes (0 = disabled, owner is never kicked)
  offline-kick-minutes: 5

# -----------------------------------------------
# Custom Join/Leave Message Settings
# -----------------------------------------------
# Placeholders: {player} = player name, {displayname} = display name,
# {world} = world name, {online} = online players count, {max} = max players
# Use & for color codes (e.g., &a = green, &c = red, &l = bold, &e = yellow)

join-message:
  enabled: false
  # Hide the default Minecraft join message
  hide-vanilla: true
  # Broadcast to all players
  broadcast: true
  # Message shown to everyone when player joins
  message: "&3{player} joined the game"

leave-message:
  enabled: false
  # Hide the default Minecraft leave message
  hide-vanilla: true
  # Broadcast to all players
  broadcast: true
  # Message shown when player leaves
  message: "&3{player} left the game"

# -----------------------------------------------
# Custom Death Message Settings
# -----------------------------------------------
# Placeholders: {message} = original Minecraft death message,
# {player} = dead player name, {killer} = killer name (if any)
# Use & for color codes.

death-message:
  enabled: true
  # Keep the original Minecraft death message text, but recolor it below.
  message: "{message}"
  # Main message color
  message-color: "&4"
  # Player/killer name color
  name-color: "&3"

# -----------------------------------------------
# Tab List Header/Footer Settings
# -----------------------------------------------
# Placeholders: %server_tps_1_colored%, %server_online%,
# %player_ping%, %server_uptime%

tab-list:
  enabled: true
  # How often to refresh dynamic placeholders, in seconds
  update-interval: 1
  header:
    - ""
    - "&7&o&l  2BUILDERS      "
    - "&7&o&l  2TOOLS &6&o- Thailand"
    - ""
  footer:
    - ""
    - "%server_tps_1_colored% &3tps - %server_online% players - %player_ping% ping - %server_uptime% uptime"
    - ""
    - "&7contact: @ dsc.gg/2b2t-th"
    - "&7discord: dsc.gg/2b2t-th"
    - "&7website: 2b2t-th.org"
    - "  &7If you need to contact us or found a bug, please contact us on discord  "
    - ""

# -----------------------------------------------
# Broadcast Settings
# -----------------------------------------------
broadcast:
  # Prefix shown before broadcast messages
  prefix: "&6&l[Alert]&r "

# -----------------------------------------------
# Queue Command Settings
# -----------------------------------------------
queue:
  message:
    - "&6Queue lengths:"
    - "&7Regular: &f0"
    - "&7Priority: &f0"
    - "&7Online: &f{online}/{max}"

# -----------------------------------------------
# Help Messages Settings
# -----------------------------------------------
# Use & for color codes. Each page supports up to 5 lines.
# Add more pages by creating '2:', '3:', etc.
helps:
  # Pages shown to normal players (non-OP)
  normal:
    '1':
      - "&e/chatsettings &7- Open chat settings GUI"
      - "&e/msg <player> <msg> &7- Send a private message"
      - "&e/tell <player> <msg> &7- Alias for /msg"
      - "&e/w <player> <msg> &7- Alias for /msg"
      - "&e/whisper <player> <msg> &7- Alias for /msg"
    '2':
      - "&e/dm <player> <msg> &7- Alias for /msg"
      - "&e/pm <player> <msg> &7- Alias for /msg"
      - "&e/r <msg> &7- Reply to the last private message"
      - "&e/reply <msg> &7- Alias for /r"
      - "&e/stats [player] &7- View player stats"
    '3':
      - "&e/topstats &7- View leaderboard (GUI)"
      - "&e/kill &7- Kill yourself"

  # Pages shown to OP players (full help)
  op:
    '1':
      - "&6--- Teleportation & Spawn ---"
      - "&e/spawn &7- Teleport to spawn"
      - "&e/setspawn &7- Set the spawn point (OP)"
      - "&e/tpa <player> &7- Request to teleport to a player"
      - "&e/tpahere <player> &7- Request a player to teleport to you"
    '2':
      - "&e/tpaccept / /tpdeny &7- Accept or deny TPA requests"
      - "&e/tpcancel &7- Cancel your outgoing TPA request"
      - "&e/tpaon / /tpaoff &7- Toggle receiving TPA requests"
      - "&e/s <player> &7- Summon a player to you (OP)"
      - "&6--- Homes ---"
    '3':
      - "&e/home [1-4] &7- Teleport to your home"
      - "&e/sethome <1-4> &7- Set a home location"
      - "&e/delhome <1-4> &7- Delete a home location"
      - "&6--- Messaging & Chat ---"
      - "&e/msg <player> <msg> &7- Send a private message"
    '4':
      - "&e/r <msg> &7- Reply to the last private message"
      - "&e/chat <on|off|team|...> &7- Change chat settings"
      - "&e/chatsettings &7- Open chat settings GUI"
      - "&6--- Team System ---"
      - "&e/team info &7- Show team information"
    '5':
      - "&e/team create <name> &7- Create a new team"
      - "&e/team invite <player> &7- Invite a player to your team"
      - "&e/team list &7- List all teams"
      - "&6--- Utilities & Admin ---"
      - "&e/stats [player] &7- View player stats"
    '6':
      - "&e/topstats &7- View leaderboard (GUI)"
      - "&e/tpsmore [show] &7- View detailed performance info (OP)"
      - "&e/v &7- Toggle vanish (OP)"
      - "&e/bc <msg> &7- Broadcast a message (OP)"
      - "&e/gmc/gms/gmsp/gma &7- Change gamemode (OP)"
    '7':
      - "&e/kill [player] &7- Kill yourself or others (OP)"
      - "&e/upreload &7- Reload plugin configuration (OP)"
