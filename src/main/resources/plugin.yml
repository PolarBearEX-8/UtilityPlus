name: UtilityPlus
version: ${version}
main: zeb.deluxeg4.utilityplus.UtilityPlus
api-version: '1.21'
folia-supported: true
description: Spawn, homes, TPA, chat, teams, stats, and admin utilities
author: CADS

commands:
  # --- Spawn ---
  setspawn:
    description: Set the server spawn point
    usage: /setspawn
    permission: utilityplus.setspawn
  spawn:
    description: Teleport to spawn
    usage: /spawn
    permission: utilityplus.spawn

  # --- Home ---
  sethome:
    description: Set a home slot
    usage: /sethome <1|2|3|4>
    permission: utilityplus.sethome
  home:
    description: Open homes or teleport to a home
    usage: /home [1|2|3|4]
    permission: utilityplus.home
  delhome:
    description: Delete a home slot
    usage: /delhome <1|2|3|4>
    permission: utilityplus.delhome

  # --- TPA ---
  tpa:
    description: Request to teleport to another player
    usage: /tpa <player>
    permission: utilityplus.tpa
  tpahere:
    description: Request another player teleport to you
    usage: /tpahere <player>
    permission: utilityplus.tpa
  tpaccept:
    description: Accept a pending teleport request
    usage: /tpaccept
    permission: utilityplus.tpa
  tpdeny:
    description: Deny a pending teleport request
    usage: /tpdeny
    permission: utilityplus.tpa
  tpcancel:
    description: Cancel outgoing teleport requests
    usage: /tpcancel
    permission: utilityplus.tpa
  tpaon:
    description: Enable incoming teleport requests
    usage: /tpaon
    permission: utilityplus.tpa
  tpaoff:
    description: Disable incoming teleport requests
    usage: /tpaoff
    permission: utilityplus.tpa

  # --- Chat ---
  chat:
    description: Manage chat preferences
    usage: /chat <on|off|teamon|teamoff|pmon|pmoff|team>
    permission: utilityplus.chat
  chatsettings:
    description: View chat settings
    usage: /chatsettings
    permission: utilityplus.chat

  # --- PM ---
  msg:
    description: Send a private message
    usage: /msg <player> <message>
    permission: utilityplus.pm
  tell:
    description: Send a private message
    usage: /tell <player> <message>
    permission: utilityplus.pm
  w:
    description: Send a private message
    usage: /w <player> <message>
    permission: utilityplus.pm
  whisper:
    description: Send a private message
    usage: /whisper <player> <message>
    permission: utilityplus.pm
  dm:
    description: Send a private message
    usage: /dm <player> <message>
    permission: utilityplus.pm
  pm:
    description: Send a private message
    usage: /pm <player> <message>
    permission: utilityplus.pm
  r:
    description: Reply to the last private message
    usage: /r <message>
    permission: utilityplus.pm
  reply:
    description: Reply to the last private message
    usage: /reply <message>
    permission: utilityplus.pm
  l:
    description: Message the player you last messaged
    usage: /l <message>
    permission: utilityplus.pm
  last:
    description: Message the player you last messaged
    usage: /last <message>
    permission: utilityplus.pm

  # --- 2b2t-style chat controls ---
  ignore:
    description: Temporarily ignore a player
    usage: /ignore <player>
    permission: utilityplus.chat
  ignorehard:
    description: Permanently ignore a player
    usage: /ignorehard <player>
    permission: utilityplus.chat
  ignorelist:
    description: List permanently ignored players
    usage: /ignorelist
    permission: utilityplus.chat
  ignoredeathmsgs:
    description: Hide death messages from a player
    usage: /ignoredeathmsgs <player>
    permission: utilityplus.chat
  togglechat:
    description: Toggle global chat visibility
    usage: /togglechat
    permission: utilityplus.chat
  toggleprivatemsgs:
    description: Toggle private message visibility
    usage: /toggleprivatemsgs
    permission: utilityplus.chat
  toggledeathmsgs:
    description: Toggle death message visibility until restart
    usage: /toggledeathmsgs
    permission: utilityplus.chat
  toggledeathmsgshard:
    description: Toggle death message visibility permanently
    usage: /toggledeathmsgshard
    permission: utilityplus.chat
  queue:
    description: Displays current queue lengths
    usage: /queue
    permission: utilityplus.queue

  # --- Team ---
  team:
    description: UtilityPlus — Team system
    usage: /team <create|invite|accept|deny|leave|disband|kick|promote|demote|list|chat|info>
    permission: utilityplus.team

  upreload:
    description: Reload UtilityPlus config and data
    usage: /upreload
    permission: utilityplus.reload

  # --- Vanish ---
  v:
    description: Toggle vanish mode (invisibility)
    usage: /v
    permission: utilityplus.vanish

  # --- Broadcast ---
  bc:
    description: Broadcast a message to all players
    usage: /bc <message>
    permission: utilityplus.broadcast
  broadcast:
    description: Broadcast a message to all players
    usage: /broadcast <message>
    permission: utilityplus.broadcast

  # --- Gamemode ---
  gmc:
    description: Set gamemode to Creative
    usage: /gmc [player]
    permission: utilityplus.gamemode
  gms:
    description: Set gamemode to Survival
    usage: /gms [player]
    permission: utilityplus.gamemode
  gmsp:
    description: Set gamemode to Spectator
    usage: /gmsp [player]
    permission: utilityplus.gamemode
  gma:
    description: Set gamemode to Adventure
    usage: /gma [player]
    permission: utilityplus.gamemode

  kill:
    description: Kill yourself (needs confirmation) or another player
    usage: /kill [player]
    permission: utilityplus.kill

  stopnow:
    description: Starts a shutdown countdown
    usage: /stopnow <time|now|cancel|time>
    permission: server.stop

  overclock:
    description: Overclock the item in your hand
    usage: /overclock <enchant> <level> | /overclock 32k | /overclock name <name>
    permission: utilityplus.overclock

  invsee:
    description: Open another player's inventory
    usage: /invsee <player>
    permission: utilityplus.invsee
  enderchestsee:
    description: Open another player's ender chest
    usage: /enderchestsee <player>
    permission: utilityplus.enderchestsee

  s:
    description: Summon a player to your location
    usage: /s <player>
    permission: utilityplus.summon

  helps:
    description: Show UtilityPlus help menu
    usage: /helps [page]
    permission: utilityplus.helps

  stats:
    description: View your kills and deaths
    usage: /stats [player]
    permission: utilityplus.stats
  topstats:
    description: View the top killers and deaths in a GUI
    usage: /topstats
    permission: utilityplus.topstats

  tpsmore:
    description: Show detailed TPS and performance info
    usage: /tpsmore [show]
    permission: utilityplus.tpsmore
  tps:
    description: Show detailed TPS and performance info (Async)
    usage: /tps [show]
    permission: utilityplus.tpsmore

permissions:
  utilityplus.helps:
    description: Access the plugin help menu
    default: true
  utilityplus.setspawn:
    description: Set the server spawn point
    default: op
  utilityplus.spawn:
    description: Teleport to spawn
    default: true
  utilityplus.sethome:
    description: Set homes
    default: true
  utilityplus.home:
    description: Use homes
    default: true
  utilityplus.delhome:
    description: Delete homes
    default: true
  utilityplus.tpa:
    description: Use teleport requests
    default: true
  utilityplus.chat:
    description: Manage chat preferences
    default: true
  utilityplus.pm:
    description: Send private messages
    default: true
  utilityplus.team:
    description: Use the team system
    default: true
  utilityplus.anvil.color:
    description: Use color codes in anvil item names
    default: true
  utilityplus.reload:
    description: Reload UtilityPlus config and data
    default: op
  utilityplus.vanish:
    description: Toggle vanish mode
    default: op
  utilityplus.vanish.see:
    description: See vanished players
    default: op
  utilityplus.broadcast:
    description: Broadcast messages
    default: op
  utilityplus.gamemode:
    description: Change own gamemode
    default: op
  utilityplus.gamemode.others:
    description: Change other players' gamemode
    default: op
  utilityplus.summon:
    description: Summon other players to your location
    default: op
  utilityplus.kill:
    description: Kill yourself (needs confirmation)
    default: true
  server.stop:
    description: Allows starting the server shutdown countdown
    default: op
  utilityplus.overclock:
    description: Overclock items and apply unsafe enchantments
    default: op
  utilityplus.invsee:
    description: Open another player's inventory
    default: op
  utilityplus.enderchestsee:
    description: Open another player's ender chest
    default: op
  utilityplus.stats:
    description: View kills and deaths
    default: true
  utilityplus.topstats:
    description: View the top players GUI
    default: true
  utilityplus.tpsmore:
    description: View detailed TPS and performance info
    default: op
  utilityplus.queue:
    description: View queue lengths
    default: true
